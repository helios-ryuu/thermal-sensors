name: thermal-monitoring

services:
  node-exporter:
    image: prom/node-exporter:latest
    container_name: thermal-node-exporter
    command:
      - --collector.disable-defaults
      - --collector.textfile
      - --collector.textfile.directory=/textfile
    volumes:
      - /var/lib/thermal-sensors/textfile:/textfile:ro
    networks:
      - monitoring
    read_only: true
    security_opt:
      - no-new-privileges=true
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: thermal-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=2GB
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring
    depends_on:
      - node-exporter
    security_opt:
      - no-new-privileges=true
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: thermal-grafana
    ports:
      - "100.120.64.5:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    secrets:
      - grafana_admin_password
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring
    depends_on:
      - prometheus
    security_opt:
      - no-new-privileges=true
    restart: unless-stopped

networks:
  monitoring:
    name: thermal-monitoring

volumes:
  prometheus-data:
    name: thermal-monitoring-prometheus-data
  grafana-data:
    name: thermal-monitoring-grafana-data

secrets:
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
